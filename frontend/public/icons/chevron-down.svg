


        <svg class="cermont-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cermont-icon {
      overflow: visible;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }
    .cermont-icon:hover {
      transform: scale(1.08);
